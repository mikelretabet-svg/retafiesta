  <style>
    :root {
      --brand-dark:  #0b1a14;
      --brand-dark2: #142821;
      --brand-green: #a5e81f;
      --brand-green-hover: #92cc1b;
      --gold: #ffd83d;
      --pink: #ff6b9d;
      --blue: #4ac6ff;
      --text: #1a2a24;
      --muted: #6b7280;
      --border: #d1d5db;
      --border-soft: #e5e7eb;
      --danger: #dc2626;
      --success: #10b981;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
      background:
        radial-gradient(ellipse 800px 500px at top left, rgba(165, 232, 31, 0.18), transparent 60%),
        radial-gradient(ellipse 700px 500px at bottom right, rgba(255, 107, 157, 0.12), transparent 60%),
        radial-gradient(ellipse 600px 400px at 80% 20%, rgba(255, 216, 61, 0.12), transparent 60%),
        linear-gradient(180deg, #fafcf4 0%, #f4f5f7 100%);
      background-attachment: fixed;
    }
    body.center {
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .topbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 20px;
      background: linear-gradient(135deg, #0b1a14 0%, #142821 100%);
      color: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
    }
    .topbar-brand { display: flex; align-items: center; gap: 12px; }
    .topbar-logo {
      width: 38px; height: 38px; border-radius: 9px; object-fit: cover;
      box-shadow: 0 0 0 2px var(--brand-green);
    }
    .topbar-title { font-weight: 800; letter-spacing: .5px; font-size: 1.05rem; }
    .topbar .muted { color: #a7b5ae; margin-left: 6px; font-weight: 400; font-size: .9rem; }
    .container {
      max-width: 760px; margin: 24px auto; padding: 0 16px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .card {
      background: #fff; padding: 24px; border-radius: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }
    .card--login {
      width: 100%; max-width: 400px; text-align: center;
      border: 2px solid var(--brand-green);
    }
    .card--login .card-body { text-align: left; }
    .card--success {
      border-left: 6px solid var(--success);
      background: linear-gradient(135deg, #fff 0%, #f0fdf4 100%);
    }
    .card--results {
      background: linear-gradient(135deg, #fff8dc 0%, #fff 50%, #f0fdf4 100%);
      border: 2px solid var(--gold);
    }
    .login-logo {
      width: 120px; height: 120px; border-radius: 22px; object-fit: cover;
      margin: 0 auto 8px; display: block;
      box-shadow: 0 8px 24px rgba(0,0,0,.18);
    }
    .login-brand {
      margin: 8px 0 2px;
      font-size: 1.9rem; font-weight: 900; letter-spacing: 2px;
      background: linear-gradient(90deg, var(--brand-dark) 0%, var(--brand-green-hover) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .login-tagline {
      color: var(--muted); font-size: .95rem; margin: 0 0 4px;
    }
    h1 { margin-top: 0; font-size: 1.5rem; }
    h2 { margin-top: 0; font-size: 1.2rem; }
    h3 {
      margin: 0 0 10px; font-size: 1.05rem;
      color: var(--brand-dark);
      font-weight: 700;
    }
    .muted { color: var(--muted); }
    label { display: block; margin-top: 12px; font-weight: 500; font-size: .95rem; }
    input[type="email"], input[type="password"], input[type="text"] {
      width: 100%; padding: 11px 14px; border: 1.5px solid var(--border);
      border-radius: 8px; font-size: 1rem; margin-top: 4px;
      background: #fff;
      transition: border-color .15s, box-shadow .15s;
    }
    input:focus {
      outline: none;
      border-color: var(--brand-green);
      box-shadow: 0 0 0 3px rgba(165, 232, 31, .25);
    }
    button {
      margin-top: 18px; padding: 13px 26px;
      background: linear-gradient(135deg, var(--brand-green) 0%, var(--brand-green-hover) 100%);
      color: var(--brand-dark);
      border: none; border-radius: 8px; cursor: pointer;
      font-size: 1.05rem; font-weight: 800; letter-spacing: .3px;
      box-shadow: 0 4px 12px rgba(165, 232, 31, .35);
      transition: transform .1s, box-shadow .15s;
    }
    button:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(165, 232, 31, .45); }
    button:active { transform: translateY(0); }
    button:disabled {
      background: #d7e9a5; color: #5a6b49; cursor: not-allowed;
      transform: none; box-shadow: none;
    }
    button.ghost {
      background: transparent; color: #fff; border: 1px solid #3a5047;
      margin-top: 0; padding: 6px 12px; font-size: .9rem; font-weight: 500;
      box-shadow: none;
    }
    button.ghost:hover { background: #1f3a2f; transform: none; box-shadow: none; }
    .error { color: var(--danger); margin-top: 10px; min-height: 1.2em; font-size: .95rem; }

    /* --- Formulario de voto --- */
    .category {
      padding: 18px;
      border: 1.5px solid var(--border-soft);
      border-radius: 12px;
      margin-bottom: 12px;
      background: #fafbfc;
      transition: border-color .2s, transform .1s;
    }
    .category:hover { border-color: var(--brand-green); }
    .category input[type="text"] {
      margin-top: 2px;
      font-size: 1.05rem;
    }
    .cat-emoji { font-size: 1.4rem; margin-right: 6px; }

    .progress-bar {
      background: var(--border-soft); border-radius: 999px; height: 12px;
      overflow: hidden; margin: 8px 0;
    }
    .progress-fill {
      background: linear-gradient(90deg, var(--brand-green) 0%, var(--brand-green-hover) 100%);
      height: 100%; transition: width .4s;
      border-radius: 999px;
    }
    .summary { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 10px; }
    .summary > div {
      flex: 1; min-width: 100px;
      background: linear-gradient(135deg, #f4f5f7 0%, #fafcf4 100%);
      padding: 14px; border-radius: 10px; text-align: center;
      border: 1px solid var(--border-soft);
    }
    .summary span {
      display: block; font-size: 1.7rem; font-weight: 800; color: var(--brand-dark);
    }
    .summary small { color: var(--muted); }

    /* --- Resultados --- */
    .result-category {
      margin-bottom: 22px;
      animation: fadeInUp 0.5s ease-out forwards;
      opacity: 0;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .result-category h3 { font-size: 1.15rem; margin-bottom: 12px; }
    .result-row {
      margin-bottom: 10px;
      padding: 10px 14px;
      background: #fafbfc;
      border-radius: 8px;
      border-left: 3px solid transparent;
      transition: background .15s;
    }
    .result-row.winner {
      background: linear-gradient(90deg, #fffbea 0%, #fff 100%);
      border-left-color: var(--gold);
      animation: winnerGlow 2s ease-in-out infinite;
    }
    @keyframes winnerGlow {
      0%, 100% { box-shadow: 0 0 0 rgba(255, 216, 61, 0); }
      50% { box-shadow: 0 0 14px rgba(255, 216, 61, 0.4); }
    }
    .result-row.winner strong { color: #b8860b; font-size: 1.05rem; }
    .result-label {
      display: flex; justify-content: space-between;
      font-size: .95rem; margin-bottom: 6px;
      gap: 8px;
    }
    .no-votes { color: var(--muted); font-style: italic; padding: 10px; }

    /* --- Pantalla de celebración --- */
    .big-headline {
      font-size: 2rem;
      font-weight: 900;
      text-align: center;
      margin: 10px 0 20px;
      letter-spacing: 1px;
      background: linear-gradient(90deg, var(--brand-dark) 0%, var(--brand-green-hover) 50%, var(--gold) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .waiting-screen { text-align: center; padding: 10px 0; }
    .waiting-emoji {
      font-size: 3.5rem; margin: 10px 0;
      animation: bounce 1.5s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    .table th, .table td {
      padding: 8px 10px; text-align: left;
      border-bottom: 1px solid var(--border-soft); font-size: .95rem;
    }
    .table th { background: #f9fafb; font-weight: 600; }
    .loading { text-align: center; padding: 40px; color: var(--muted); font-size: 1.1rem; }

    /* --- Confeti --- */
    .confetti-piece {
      position: fixed;
      top: -20px;
      z-index: 9999;
      pointer-events: none;
      border-radius: 2px;
      animation: confetti-fall linear forwards;
    }
    @keyframes confetti-fall {
      0% { transform: translateY(0) rotate(0); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0.5; }
    }
  </style>

    const APP_NAME = 'RETAFIESTA';

    const CATEGORY_EMOJIS = {
      'MVP': '🏆',
      'Rookie': '🐣',
      'Borracho pesado': '🍺',
      'Rompevaso': '💥',
      'Bailongo': '💃',
      'Estatua de sal': '🗿',
      'Sombra del DJ': '🎧'
    };
    const catEmoji = (title) => CATEGORY_EMOJIS[title] || '🎯';

    const sb  = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const app = document.getElementById('app');

    function h(tag, attrs = {}, ...children) {
      const el = document.createElement(tag);
      for (const [k, v] of Object.entries(attrs)) {
        if (v === null || v === undefined || v === false) continue;
        if (k === 'class') el.className = v;
        else if (k.startsWith('on') && typeof v === 'function') el.addEventListener(k.slice(2), v);
        else el.setAttribute(k, v);
      }
      for (const c of children.flat()) {
        if (c == null) continue;
        el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
      }
      return el;
    }
    const clear = () => { app.innerHTML = ''; };

    function celebrate(intensity = 100) {
      const colors = ['#a5e81f', '#ffd83d', '#ff6b9d', '#4ac6ff', '#ff8c42', '#ffffff', '#92cc1b'];
      for (let i = 0; i < intensity; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + 'vw';
        piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDelay = (Math.random() * 0.4) + 's';
        piece.style.animationDuration = (2.5 + Math.random() * 2) + 's';
        const size = 6 + Math.random() * 9;
        piece.style.width = size + 'px';
        piece.style.height = (size * (0.6 + Math.random() * 0.6)) + 'px';
        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), 5500);
      }
    }

    let pollTimer = null, adminTimer = null;
    function stopTimers() {
      if (pollTimer) clearInterval(pollTimer);
      if (adminTimer) clearInterval(adminTimer);
      pollTimer = adminTimer = null;
    }

    function topbar(title, userLabel) {
      return h('header', { class: 'topbar' },
        h('div', { class: 'topbar-brand' },
          h('img', { class: 'topbar-logo', src: LOGO_URI, alt: APP_NAME }),
          h('div', {},
            h('span', { class: 'topbar-title' }, '🎉 ' + title),
            h('span', { class: 'muted' }, ' · ' + userLabel)
          )
        ),
        h('button', { class: 'ghost', onclick: logout }, 'Cerrar sesión')
      );
    }

    async function init() {
      stopTimers();
      const { data: { session } } = await sb.auth.getSession();
      if (!session) return renderLogin();
      const { data: profile, error } = await sb.from('profiles')
        .select('role, display_name').eq('id', session.user.id).single();
      if (error) {
        console.error(error);
        await sb.auth.signOut();
        return renderLogin('No se pudo cargar tu perfil.');
      }
      if (profile.role === 'admin') return renderAdmin(session.user, profile);
      return renderVoter(session.user, profile);
    }

    sb.auth.onAuthStateChange((event) => {
      if (event === 'SIGNED_OUT') renderLogin();
    });

    // ------------------ LOGIN ------------------
    function renderLogin(initialError = '') {
      clear();
      document.body.className = 'center';

      const errorEl = h('p', { class: 'error' }, initialError);
      const btn = h('button', { type: 'submit' }, '🚀 Entrar');
      const form = h('form', {
        onsubmit: async (e) => {
          e.preventDefault();
          errorEl.textContent = '';
          btn.disabled = true;
          const email = form.email.value.trim();
          const password = form.password.value;
          const { error } = await sb.auth.signInWithPassword({ email, password });
          btn.disabled = false;
          if (error) {
            errorEl.textContent = error.message === 'Invalid login credentials'
              ? 'Usuario o contraseña incorrectos'
              : error.message;
            return;
          }
          init();
        }
      },
        h('label', { for: 'email' }, 'Usuario'),
        h('input', { id: 'email', name: 'email', type: 'email',
                     required: 'required', autocomplete: 'username',
                     placeholder: 'nombre@retafiesta.local' }),
        h('label', { for: 'password' }, 'Contraseña'),
        h('input', { id: 'password', name: 'password', type: 'password',
                     required: 'required', autocomplete: 'current-password' }),
        btn,
        errorEl
      );

      app.appendChild(
        h('main', { class: 'card card--login' },
          h('img', { class: 'login-logo', src: LOGO_URI, alt: APP_NAME }),
          h('div', { class: 'login-brand' }, APP_NAME + ' 🎉'),
          h('p', { class: 'login-tagline' }, '¡Vota a los reyes y reinas de la noche!'),
          h('div', { class: 'card-body' },
            form
          )
        )
      );
    }

    // ------------------ VOTANTE ------------------
    async function renderVoter(user, profile) {
      clear();
      document.body.className = '';
      const userLabel = profile.display_name || user.email;

      const mainSection    = h('section', { class: 'card', id: 'mainSection' });
      const container = h('main', { class: 'container' }, mainSection);

      app.appendChild(topbar(APP_NAME, userLabel));
      app.appendChild(container);

      // Comprobar si ya votó
      const { data: part } = await sb.from('event_participation').select('event_id').maybeSingle();
      if (part) {
        await renderVoterPostVote();
        pollTimer = setInterval(renderVoterPostVote, 5000);
      } else {
        await loadVotingForm();
      }
    }

    async function loadVotingForm() {
      const mainSection = document.getElementById('mainSection');
      mainSection.innerHTML = '';

      const { data: config, error } = await sb.rpc('get_event_config');
      if (error || !config) {
        mainSection.appendChild(h('h1', {}, 'No hay votación activa'));
        mainSection.appendChild(h('p', { class: 'muted' }, 'Vuelve más tarde o contacta con el administrador.'));
        return;
      }

      mainSection.appendChild(h('h1', {}, '🎭 ' + config.event.title));
      if (config.event.description)
        mainSection.appendChild(h('p', { class: 'muted' }, config.event.description));
      mainSection.appendChild(h('p', { class: 'muted', style: 'margin-top:8px' },
        '✍️ Escribe el nombre de quien consideres el ganador de cada categoría. Puedes nominar a cualquiera. Deja la casilla en blanco para abstenerte. Solo puedes votar una vez — y los resultados se revelan cuando todos hayan votado. 🥁'));

      const errorEl = h('p', { class: 'error' });
      const form = h('form', {});

      config.categories.forEach(cat => {
        const input = h('input', {
          type: 'text',
          name: 'cat_' + cat.id,
          maxlength: '80',
          placeholder: 'Nombre del ganador (deja en blanco para abstenerte)',
          autocomplete: 'off'
        });
        form.appendChild(
          h('div', { class: 'category' },
            h('h3', {},
              h('span', { class: 'cat-emoji' }, catEmoji(cat.title)),
              cat.title
            ),
            input
          )
        );
      });

      const submitBtn = h('button', { type: 'submit' }, '🎯 ¡Enviar mis votos!');
      form.appendChild(submitBtn);
      form.appendChild(errorEl);

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorEl.textContent = '';
        submitBtn.disabled = true;

        const votes = config.categories.map(cat => {
          const input = form.querySelector(`input[name="cat_${cat.id}"]`);
          return { category_id: cat.id, candidate_name: (input.value || '').trim() };
        });

        const { error } = await sb.rpc('cast_votes', { p_votes: votes });
        submitBtn.disabled = false;
        if (error) { errorEl.textContent = error.message; return; }

        celebrate(120);
        await renderVoterPostVote();
        pollTimer = setInterval(renderVoterPostVote, 5000);
      });

      mainSection.appendChild(form);
    }

    let _lastAllDone = false;
    async function renderVoterPostVote() {
      const mainSection = document.getElementById('mainSection');
      if (!mainSection) return;

      const { data, error } = await sb.rpc('get_progress');
      if (error || !data || !data[0]) return;
      const p = data[0];

      if (p.all_done) {
        // ¡Resultados!
        const wasWaiting = !_lastAllDone;
        _lastAllDone = true;
        if (pollTimer) clearInterval(pollTimer);
        await renderVoterResults(wasWaiting);
      } else {
        // Todavía esperando
        mainSection.className = 'card card--success';
        mainSection.innerHTML = '';
        mainSection.appendChild(
          h('div', { class: 'waiting-screen' },
            h('div', { class: 'waiting-emoji' }, '🥁'),
            h('h2', { style: 'margin-top:0' }, '🎉 ¡Tus votos ya están grabados!'),
            h('p', { class: 'muted' }, 'Esperando a que el resto del grupo termine de votar. Prepárate para la gala 🎭'),
            h('div', { style: 'margin-top:18px' },
              h('div', { class: 'progress-bar' },
                h('div', { class: 'progress-fill', style: `width:${p.percentage}%` })
              ),
              h('p', { class: 'muted', style: 'margin:4px 0 0' },
                `${p.voted} de ${p.total_voters} han votado · faltan ${p.pending}`)
            ),
            h('p', { class: 'muted', style: 'margin-top:14px; font-size:.9rem' },
              '🔒 Los resultados están ocultos hasta que todos hayan votado.')
          )
        );
      }
    }

    async function renderVoterResults(withCelebration) {
      const mainSection = document.getElementById('mainSection');
      mainSection.className = 'card card--results';
      mainSection.innerHTML = '';

      mainSection.appendChild(h('div', { class: 'big-headline' }, '🏆 ¡RESULTADOS! 🏆'));
      mainSection.appendChild(h('p', {
        class: 'muted',
        style: 'text-align:center; margin:-12px 0 18px'
      }, 'Los premios RETAFIESTA ya tienen ganadores 🎉'));

      const { data: results, error } = await sb.rpc('get_public_results');
      if (error) {
        mainSection.appendChild(h('p', { class: 'error' }, error.message));
        return;
      }
      renderResultsInto(mainSection, results || []);

      if (withCelebration) {
        celebrate(200);
        setTimeout(() => celebrate(100), 800);
      }
    }

    function renderResultsInto(parent, rows) {
      const byCat = new Map();
      rows.forEach(r => {
        if (!byCat.has(r.category_id)) {
          byCat.set(r.category_id, {
            title: r.category_title,
            position: r.category_position,
            rows: []
          });
        }
        if (r.candidate_name !== null) {
          byCat.get(r.category_id).rows.push(r);
        }
      });

      const catsSorted = Array.from(byCat.values()).sort((a,b) => a.position - b.position);
      catsSorted.forEach((cat, idx) => {
        const totalForCat = cat.rows.reduce((s, r) => s + r.vote_count, 0);
        const maxCount = cat.rows.length ? Math.max(...cat.rows.map(r => r.vote_count)) : 0;

        const catDiv = h('div', { class: 'result-category',
                                   style: `animation-delay: ${idx * 0.12}s` });
        catDiv.appendChild(
          h('h3', {},
            h('span', { class: 'cat-emoji' }, catEmoji(cat.title)),
            `${cat.title} · ${totalForCat} voto${totalForCat===1?'':'s'}`)
        );

        if (cat.rows.length === 0) {
          catDiv.appendChild(h('p', { class: 'no-votes' }, 'Sin votos 🤷'));
        } else {
          cat.rows.forEach(r => {
            const pct = totalForCat > 0 ? Math.round((r.vote_count / totalForCat) * 100) : 0;
            const isWinner = r.vote_count === maxCount && maxCount > 0;
            catDiv.appendChild(
              h('div', { class: 'result-row' + (isWinner ? ' winner' : '') },
                h('div', { class: 'result-label' },
                  h('strong', {}, (isWinner ? '👑 ' : '') + r.candidate_name),
                  h('span', {}, `${r.vote_count} (${pct}%)`)
                ),
                h('div', { class: 'progress-bar' },
                  h('div', { class: 'progress-fill', style: `width:${pct}%` })
                )
              )
            );
          });
        }

        parent.appendChild(catDiv);
      });
    }

    // ------------------ ADMIN ------------------
    async function renderAdmin(user, profile) {
      clear();
      document.body.className = '';
      const userLabel = profile.display_name || user.email;

      const summarySection = h('section', { class: 'card', id: 'summary' });
      const resultsSection = h('section', { class: 'card' },
        h('h2', {}, '🏆 Resultados por categoría'),
        h('div', { id: 'results' })
      );
      const votersSection = h('section', { class: 'card' },
        h('h2', {}, '👥 Estado de participación'),
        h('p', { class: 'muted' }, 'Solo se muestra si cada persona ha votado, nunca qué opción eligió.'),
        h('table', { class: 'table' },
          h('thead', {},
            h('tr', {},
              h('th', {}, 'Usuario'),
              h('th', {}, 'Email'),
              h('th', {}, 'Estado')
            )
          ),
          h('tbody', { id: 'votersBody' })
        )
      );

      app.appendChild(topbar(APP_NAME + ' · Admin', userLabel));
      app.appendChild(h('main', { class: 'container' }, summarySection, resultsSection, votersSection));

      await refreshAdmin();
      adminTimer = setInterval(refreshAdmin, 5000);
    }

    async function refreshAdmin() {
      const [eventRes, resultsRes, votersRes] = await Promise.all([
        sb.from('events').select('*').eq('status', 'active')
          .order('created_at', { ascending: false }).limit(1).maybeSingle(),
        sb.rpc('get_results'),
        sb.rpc('get_voters_status')
      ]);

      const summary     = document.getElementById('summary');
      const resultsDiv  = document.getElementById('results');
      const votersBody  = document.getElementById('votersBody');

      const event = eventRes.data;
      summary.innerHTML = '';
      summary.appendChild(h('h1', {}, event ? '🎉 ' + event.title : 'No hay evento activo'));
      if (event && event.description)
        summary.appendChild(h('p', { class: 'muted' }, event.description));

      const totalVoters = (votersRes.data || []).length;
      const voted = (votersRes.data || []).filter(v => v.has_voted).length;
      const pending = Math.max(0, totalVoters - voted);

      summary.appendChild(
        h('div', { class: 'summary' },
          h('div', {}, h('span', {}, String(voted)),       h('small', {}, 'Han votado')),
          h('div', {}, h('span', {}, String(pending)),     h('small', {}, 'Pendientes')),
          h('div', {}, h('span', {}, String(totalVoters)), h('small', {}, 'Votantes totales'))
        )
      );

      resultsDiv.innerHTML = '';
      renderResultsInto(resultsDiv, resultsRes.data || []);

      votersBody.innerHTML = '';
      (votersRes.data || []).forEach(v => {
        votersBody.appendChild(
          h('tr', {},
            h('td', {}, v.display_name),
            h('td', {}, v.email),
            h('td', {}, v.has_voted ? '✔ Ha votado' : '⏳ Pendiente')
          )
        );
      });
    }

    async function logout() {
      stopTimers();
      _lastAllDone = false;
      await sb.auth.signOut();
    }

    init();
  </script>
</body>
